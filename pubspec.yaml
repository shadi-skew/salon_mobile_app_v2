name: salon_mobile_app_v2
description: "Salon Mobile App"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State Management
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4

  # Dependency Injection
  get_it: ^7.7.0
  injectable: ^2.4.0

  # Networking
  dio: ^5.4.0
  internet_connection_checker: ^1.0.0

  # Functional Programming
  dartz: ^0.10.1
  equatable: ^2.0.5

  # Code Generation
  freezed_annotation: ^2.4.4
  json_annotation: ^4.8.1

  # Image Loading
  cached_network_image: ^3.3.1

  # Routing
  go_router: ^14.2.0

  # UI & Utilities
  flutter_screenutil: ^5.9.0
  flutter_svg: ^2.2.3
  shimmer: ^3.0.0

  # Internationalization
  intl: any

  # Local Storage
  shared_preferences: ^2.3.5

  # Image Picker & Processing
  image_picker: ^1.1.2
  image: ^4.5.3

  # Camera
  camera: ^0.11.1
  path_provider: ^2.1.5
  vector_math: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

  # Code Generation
  build_runner: ^2.4.9
  freezed: ^2.4.4
  json_serializable: ^6.7.1
  injectable_generator: ^2.7.0

flutter:
  uses-material-design: true

  assets:
    - assets/icons/
    - assets/images/
